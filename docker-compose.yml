services:
  mongodb:
    image: mongo:7
    container_name: backend-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: backend-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    environment:
      DB_URL: mongodb://mongodb:27017/backend
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
